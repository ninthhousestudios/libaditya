[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "libaditya"
version = "0.1.0"
description = "a python library for jyotisha aditya calculations"
authors = [{ name = "Josh Harper", email = "humanhaven@substack.com" }]
license = "AGPL-3.0-or-later"
readme = "README.md"
requires-python = ">=3.11"

dependencies = [
    "pyswisseph>=2.10.3",
	"prettytable>=3.16.0-1",
]

[tool.setuptools.packages.find]
where = ["libaditya"]

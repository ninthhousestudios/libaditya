[project]
name = "libaditya"
version = "0.2.0"
description = "Astrological calculation library for Adityas"
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
    "more-itertools>=10.8.0",
    "prettytable>=3.17.0",
    "pyswisseph>=2.10.3.2",
]

[tool.setuptools]
py-modules = []

[tool.setuptools.packages.find]
where = ["./"]
include = ["libaditya", "pyphemeris"]

[project.scripts]
run-module= "pyphemeris.pyphemeris:main"

[tool.uv.workspace]
members = [
    ".",
]

[tool.uv.sources]
libaditya = { workspace = true }

[dependency-groups]
dev = [
    "libaditya",
]

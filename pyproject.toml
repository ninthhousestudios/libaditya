[project]
name = "libaditya"
version = "0.2.4"
description = "Astrological calculation library for Adityas"
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
    "more-itertools>=10.8.0",
    "prettytable>=3.17.0",
    "pyswisseph>=2.10.3.2",
    "toml>=0.10.2",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.sdist]
include = [
    "libaditya"
]
exclude = [
#  "*.json",
#  "pkg/_compat.py",
]



[tool.uv.workspace]
members = [
    ".",
]

[tool.uv.sources]
libaditya = { workspace = true }

[dependency-groups]
dev = [
    "libaditya",
]
